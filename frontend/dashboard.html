<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2 class="logo">
            ExpenseTracker
        </h2>

        <ul>

    <li class="active">
        <a href="dashboard.html">
            Dashboard
        </a>
    </li>

    <li>
        <a href="add-expense.html">
            Add Expense
        </a>
    </li>

    <li>
        <a href="reports.html">
            Reports
        </a>
    </li>

    <li>
        <a href="profile.html">
            Profile
        </a>
    </li>

    <li>
        <a href="index.html">
            Logout
        </a>
    </li>

</ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <h1>
                Dashboard
            </h1>

            <div class="profile">
                Welcome, User
            </div>

        </div>

        <!-- Cards -->

        <div class="cards">

            <div class="card-box">

                <h3>Total Balance</h3>

                <h2>₹25,000</h2>

            </div>

            <div class="card-box">

                <h3>Monthly Expenses</h3>

                <h2>₹8,500</h2>

            </div>

            <div class="card-box">

                <h3>Savings</h3>

                <h2>₹16,500</h2>

            </div>

        </div>

        <!-- Recent Transactions -->

        <div class="transactions">

            <h3>
                Recent Transactions
            </h3>

            <table class="table">

                <thead>

                    <tr>

                        <th>Title</th>

                        <th>Amount</th>

                        <th>Category</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>Food</td>

                        <td>₹500</td>

                        <td>Dining</td>

                    </tr>

                    <tr>

                        <td>Uber</td>

                        <td>₹250</td>

                        <td>Travel</td>

                    </tr>

                    <tr>

                        <td>Shopping</td>

                        <td>₹1500</td>

                        <td>Lifestyle</td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
