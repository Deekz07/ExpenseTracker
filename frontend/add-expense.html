<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Expense</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2 class="logo">
            ExpenseTracker
        </h2>

        <ul>

    <li>
        <a href="dashboard.html">
            Dashboard
        </a>
    </li>

    <li class="active">
        <a href="add-expense.html">
            Add Expense
        </a>
    </li>

    <li>
        <a href="reports.html">
            Reports
        </a>
    </li>

    <li>
        <a href="profile.html">
            Profile
        </a>
    </li>

    <li>
        <a href="index.html">
            Logout
        </a>
    </li>

</ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <h1>
                Add Expense
            </h1>

        </div>

        <!-- Expense Form -->

        <div class="transactions">

            <form>

                <div class="mb-4">

                    <label class="form-label">
                        Expense Title
                    </label>

                    <input type="text"
                           class="form-control"
                           placeholder="Enter expense title">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Amount
                    </label>

                    <input type="number"
                           class="form-control"
                           placeholder="Enter amount">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Category
                    </label>

                    <select class="form-control">

                        <option>
                            Food
                        </option>

                        <option>
                            Travel
                        </option>

                        <option>
                            Shopping
                        </option>

                        <option>
                            Bills
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Date
                    </label>

                    <input type="date"
                           class="form-control">

                </div>

                <button class="btn btn-primary px-5">

                    Add Expense

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
